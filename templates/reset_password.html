<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password | AKS Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(0, 0, 0, 0.9)), url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .login-card { background: white; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); overflow: hidden; width: 100%; max-width: 900px; }
        
        .login-left { background: linear-gradient(135deg, #001d3d 0%, #00509e 100%); color: white; padding: 50px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        .login-right { padding: 50px; }
        
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #dee2e6; background-color: #f8f9fa; font-size: 0.95rem; }
        .form-control:focus { border-color: #00d4ff; box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2); background-color: white; }

        @media screen and (max-width: 768px) {
            .login-left { display: none; }
            .login-right { padding: 30px; }
            body { padding: 20px; height: auto; display: block; overflow-y: auto;}
        }
    </style>
</head>
<body>

    <div class="login-card row g-0">
        <div class="col-md-5 login-left">
            <img src="/static/images/aks_logo.jpeg" alt="AKS Logo" class="rounded-circle mx-auto mb-4 border border-3 border-white shadow" style="width: 100px; height: 100px; object-fit: cover;">
            <h2 class="fw-bold mb-3">Almost There!</h2>
            <p class="opacity-75 mb-4">Your identity has been successfully verified. Create a strong new password to secure your account.</p>
        </div>

        <div class="col-md-7 login-right d-flex flex-column justify-content-center text-center">
            
            <div class="bg-dark bg-opacity-10 text-dark rounded-circle d-inline-flex align-items-center justify-content-center mb-4 mx-auto" style="width: 70px; height: 70px;">
                <i class="fas fa-key fa-2x"></i>
            </div>
            <h3 class="fw-bold text-dark">Create New Password</h3>
            <p class="text-muted small mb-4">Please enter a strong new password below.</p>

            <form action="/reset-password" method="POST" class="text-start">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" name="new_password" placeholder="Minimum 6 characters" required minlength="6">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-dark w-100 rounded-pill py-3 fw-bold fs-6 shadow-sm">
                    Save New Password <i class="fas fa-check-circle ms-2"></i>
                </button>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
