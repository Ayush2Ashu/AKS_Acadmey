<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | AKS Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .checkout-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .razorpay-payment-button {
            background-color: #003566 !important;
            color: white !important;
            border: none !important;
            padding: 12px 30px !important;
            border-radius: 10px !important;
            font-weight: 600 !important;
            width: 100% !important;
            transition: 0.3s !important;
        }
        .razorpay-payment-button:hover { background-color: #001d3d !important; transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">AKS ACADEMY</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card checkout-card p-5 text-center bg-white">
                    <div class="mb-4">
                        <i class="fas fa-shopping-cart fa-3x text-primary"></i>
                    </div>
                    <h2 class="fw-bold mb-2">Order Summary</h2>
                    <p class="text-muted">Review your selection before payment</p>
                    
                    <hr class="my-4">
                    
                    <div class="d-flex justify-content-between mb-2">
                        <span>Course Name:</span>
                        <span class="fw-bold">{{ course_name }}</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span>Total Amount:</span>
                        <span class="fw-bold text-success">₹{{ price }}</span>
                    </div>

                    <form action="/payment_success" method="POST">
                        <input type="hidden" name="course_name" value="{{ course_name }}">
                        
                        <script
                            src="https://checkout.razorpay.com/v1/checkout.js"
                            data-key="rzp_test_your_id" 
                            data-amount="{{ payment.amount }}" 
                            data-currency="INR"
                            data-order_id="{{ payment.id }}"
                            data-buttontext="Pay & Secure Enrollment"
                            data-name="AKS Academy"
                            data-description="Enrollment Fee for {{ course_name }}"
                            data-image="https://cdn-icons-png.flaticon.com/512/3443/3443338.png"
                            data-prefill.name="{{ session.user }}"
                            data-theme.color="#003566">
                        </script>
                    </form>
                    
                    <p class="mt-4 small text-muted">
                        <i class="fas fa-shield-alt me-1"></i> Secure 256-bit encrypted payment
                    </p>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 text-center py-4 text-muted">
        © 2026 AKS Academy | Managed by Ajeet Kumar
    </footer>

</body>
</html>
